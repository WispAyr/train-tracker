<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayr — Glasgow Central | Signalman Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a1a0a;
    --panel-bg: #0d1f0d;
    --track-color: #d4d4d8;
    --track-glow: rgba(212, 212, 216, 0.15);
    --station-color: #22c55e;
    --station-dim: #15803d;
    --text-green: #4ade80;
    --text-dim: #166534;
    --signal-red: #ef4444;
    --signal-yellow: #eab308;
    --signal-green: #22c55e;
    --nb-color: #22d3ee;
    --nb-glow: rgba(34, 211, 238, 0.3);
    --sb-color: #f97316;
    --sb-glow: rgba(249, 115, 22, 0.3);
    --occupied: rgba(239, 68, 68, 0.15);
    --border: #1a3a1a;
    --header-bg: rgba(10, 26, 10, 0.95);
    --tooltip-bg: rgba(10, 26, 10, 0.95);
    --tooltip-border: #22c55e;
    --nav-link: #4ade80;
  }

  :root.light {
    --bg: #f0fdf4;
    --panel-bg: #ffffff;
    --track-color: #374151;
    --track-glow: rgba(55, 65, 81, 0.1);
    --station-color: #15803d;
    --station-dim: #86efac;
    --text-green: #15803d;
    --text-dim: #86efac;
    --signal-red: #dc2626;
    --signal-yellow: #ca8a04;
    --signal-green: #16a34a;
    --nb-color: #0891b2;
    --nb-glow: rgba(8, 145, 178, 0.2);
    --sb-color: #ea580c;
    --sb-glow: rgba(234, 88, 12, 0.2);
    --occupied: rgba(239, 68, 68, 0.08);
    --border: #bbf7d0;
    --header-bg: rgba(240, 253, 244, 0.95);
    --tooltip-bg: rgba(255, 255, 255, 0.98);
    --tooltip-border: #15803d;
    --nav-link: #15803d;
  }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text-green);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #header h1 {
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-green);
    font-weight: 400;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }

  .nav-links {
    display: flex;
    gap: 4px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .nav-links a {
    color: var(--nav-link);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.2s;
  }

  .nav-links a:hover, .nav-links a.active {
    background: var(--station-color);
    color: var(--bg);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--signal-red);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--signal-red); }
    50% { opacity: 0.4; box-shadow: 0 0 8px var(--signal-red); }
  }

  #clock {
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text-green);
  }

  .theme-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    color: var(--text-green);
  }

  #panel-container {
    padding: 40px 24px 24px;
    overflow-x: auto;
  }

  #panel {
    position: relative;
    min-width: 1100px;
    height: 400px;
    margin: 0 auto;
    max-width: 1600px;
  }

  /* Track line */
  .track-line {
    position: absolute;
    top: 200px;
    left: 60px;
    right: 60px;
    height: 4px;
    background: var(--track-color);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--track-glow);
  }

  /* Second track (double track) */
  .track-line-2 {
    position: absolute;
    top: 212px;
    left: 60px;
    right: 60px;
    height: 4px;
    background: var(--track-color);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--track-glow);
    opacity: 0.5;
  }

  /* Track sections */
  .track-section {
    position: absolute;
    top: 196px;
    height: 24px;
    border-radius: 3px;
    transition: background 0.5s;
  }

  .track-section.occupied {
    background: var(--occupied);
  }

  /* Station markers */
  .station {
    position: absolute;
    top: 170px;
    transform: translateX(-50%);
    text-align: center;
    cursor: pointer;
    z-index: 10;
  }

  .station-diamond {
    width: 16px;
    height: 16px;
    background: var(--station-color);
    transform: rotate(45deg);
    margin: 0 auto 8px;
    border: 2px solid var(--bg);
    box-shadow: 0 0 6px var(--station-color);
    transition: all 0.3s;
  }

  .station:hover .station-diamond {
    transform: rotate(45deg) scale(1.3);
    box-shadow: 0 0 12px var(--station-color);
  }

  .station-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-green);
    white-space: nowrap;
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
  }

  .station-crs {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    position: absolute;
    top: 64px;
    left: 50%;
    transform: translateX(-50%);
  }

  .station-mile {
    font-size: 8px;
    color: var(--text-dim);
    position: absolute;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Signal aspects */
  .signal {
    position: absolute;
    top: 134px;
    width: 10px;
    height: 28px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
    padding: 2px;
  }

  .signal-lamp {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #222;
    transition: all 0.5s;
  }

  .signal-lamp.red { background: var(--signal-red); box-shadow: 0 0 6px var(--signal-red); }
  .signal-lamp.yellow { background: var(--signal-yellow); box-shadow: 0 0 6px var(--signal-yellow); }
  .signal-lamp.green { background: var(--signal-green); box-shadow: 0 0 4px var(--signal-green); }

  /* Train indicators */
  .train {
    position: absolute;
    top: 170px;
    transform: translateX(-50%);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    white-space: nowrap;
    z-index: 20;
    cursor: pointer;
    transition: all 0.8s ease;
    border: 1px solid;
  }

  .train.northbound {
    top: 230px;
    background: rgba(34, 211, 238, 0.15);
    color: var(--nb-color);
    border-color: var(--nb-color);
    box-shadow: 0 0 8px var(--nb-glow);
  }

  .train.southbound {
    top: 155px;
    background: rgba(249, 115, 22, 0.15);
    color: var(--sb-color);
    border-color: var(--sb-color);
    box-shadow: 0 0 8px var(--sb-glow);
  }

  .train-arrow {
    font-size: 8px;
    margin: 0 2px;
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    z-index: 50;
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    pointer-events: none;
  }

  .tooltip.visible { display: block; }

  .tooltip h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--station-color);
    letter-spacing: 1px;
  }

  .tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    gap: 12px;
  }

  .tooltip .tt-dir { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

  /* Legend */
  #legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    padding: 16px;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 24px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid;
  }

  .legend-signal {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Footer info */
  #info-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 8px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Scanline effect (subtle) */
  #panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Direction labels */
  .direction-label {
    position: absolute;
    top: 200px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .direction-label.left { left: 0; transform: translateY(-50%); }
  .direction-label.right { right: 0; transform: translateY(-50%); }

  /* Mobile */
  @media (max-width: 768px) {
    #header { flex-direction: column; gap: 8px; }
    #panel { min-width: 900px; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>☐ Ayr — Glasgow Central <span style="font-size:11px; color:var(--text-dim); margin-left:8px;">Signalman Panel</span></h1>
  <div class="header-right">
    <nav class="nav-links">
      <a href="/">Diagram</a>
      <a href="/signalman" class="active">Signal Panel</a>
      <a href="/board">Board</a>
    </nav>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div id="clock">--:--:--</div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button>
  </div>
</div>

<div id="panel-container">
  <div id="panel">
    <div class="direction-label left">◀ AYR</div>
    <div class="track-line"></div>
    <div class="track-line-2"></div>
    <div class="direction-label right">GLC ▶</div>
  </div>
</div>

<div id="legend">
  <div class="legend-item">
    <div class="legend-swatch" style="background:rgba(34,211,238,0.15);border-color:var(--nb-color);"></div>
    Northbound (→ GLC)
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:rgba(249,115,22,0.15);border-color:var(--sb-color);"></div>
    Southbound (→ AYR)
  </div>
  <div class="legend-item">
    <div class="legend-signal" style="background:var(--signal-green);box-shadow:0 0 4px var(--signal-green);"></div>
    Clear
  </div>
  <div class="legend-item">
    <div class="legend-signal" style="background:var(--signal-yellow);box-shadow:0 0 4px var(--signal-yellow);"></div>
    Caution
  </div>
  <div class="legend-item">
    <div class="legend-signal" style="background:var(--signal-red);box-shadow:0 0 4px var(--signal-red);"></div>
    Danger
  </div>
</div>

<div id="info-bar">
  <span>Auto-refresh: 30s</span>
  <span id="train-count">Trains: --</span>
  <span id="last-update">Updated: --</span>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const STATIONS = [
  { crs: 'AYR', name: 'Ayr', mile: 0 },
  { crs: 'NOA', name: 'Newton-on-Ayr', mile: 0.7 },
  { crs: 'PTW', name: 'Prestwick Town', mile: 1.8 },
  { crs: 'PRA', name: 'Prestwick Airport', mile: 2.5 },
  { crs: 'TRN', name: 'Troon', mile: 4.5 },
  { crs: 'BSS', name: 'Barassie', mile: 5.5 },
  { crs: 'IRV', name: 'Irvine', mile: 7.5 },
  { crs: 'KWN', name: 'Kilwinning', mile: 9.5 },
  { crs: 'DLY', name: 'Dalry', mile: 14 },
  { crs: 'LHW', name: 'Lochwinnoch', mile: 18 },
  { crs: 'MIK', name: 'Milliken Park', mile: 21 },
  { crs: 'JHN', name: 'Johnstone', mile: 22 },
  { crs: 'PYG', name: 'Paisley Gilmour St', mile: 26 },
  { crs: 'GLC', name: 'Glasgow Central', mile: 31 },
];

const TOTAL_MILES = 31;
const PANEL_LEFT = 60;
let panelWidth = 0;
let allData = null;

// Theme
function toggleTheme() {
  const root = document.documentElement;
  if (root.classList.contains('light')) {
    root.classList.remove('light');
    localStorage.setItem('signal-theme', 'dark');
    document.querySelector('.theme-btn').textContent = '☀️';
  } else {
    root.classList.add('light');
    localStorage.setItem('signal-theme', 'light');
    document.querySelector('.theme-btn').textContent = '🌙';
  }
}

(function initTheme() {
  const saved = localStorage.getItem('signal-theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.querySelector('.theme-btn').textContent = '🌙';
  }
})();

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Convert mile to pixel position
function mileToX(mile) {
  const trackWidth = panelWidth - PANEL_LEFT * 2;
  return PANEL_LEFT + (mile / TOTAL_MILES) * trackWidth;
}

// Parse time string to minutes since midnight
function timeToMins(t) {
  if (!t) return null;
  const m = t.match(/(\d{2}):(\d{2})/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}

// Get effective time (expected or scheduled)
function getEffectiveTime(cp) {
  if (cp.expected && cp.expected !== 'On Time' && cp.expected !== 'Cancelled') {
    const m = cp.expected.match(/(\d{2}:\d{2})/);
    if (m) return m[1];
  }
  return cp.scheduled;
}

// Interpolate train position along route
function getTrainPosition(callingPoints, direction) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

  // Map calling points to station miles
  const points = [];
  for (const cp of callingPoints) {
    const stn = STATIONS.find(s => s.crs === cp.crs);
    if (!stn) continue;
    const t = timeToMins(getEffectiveTime(cp));
    if (t === null) continue;
    points.push({ mile: stn.mile, time: t, crs: cp.crs, station: cp.station });
  }

  if (points.length < 2) return null;

  // Sort by time
  points.sort((a, b) => a.time - b.time);

  const firstTime = points[0].time;
  const lastTime = points[points.length - 1].time;

  // Train hasn't departed yet
  if (nowMins < firstTime - 2) return null;
  // Train has arrived
  if (nowMins > lastTime + 2) return null;

  // At or before first station
  if (nowMins <= firstTime) {
    return { mile: points[0].mile, fromCrs: points[0].crs, toCrs: points[0].crs, progress: 0 };
  }

  // At or after last station
  if (nowMins >= lastTime) {
    return { mile: points[points.length - 1].mile, fromCrs: points[points.length - 1].crs, toCrs: points[points.length - 1].crs, progress: 1 };
  }

  // Between two stations - interpolate
  for (let i = 0; i < points.length - 1; i++) {
    if (nowMins >= points[i].time && nowMins <= points[i + 1].time) {
      const fraction = (nowMins - points[i].time) / (points[i + 1].time - points[i].time);
      const mile = points[i].mile + fraction * (points[i + 1].mile - points[i].mile);
      return { mile, fromCrs: points[i].crs, toCrs: points[i + 1].crs, progress: fraction };
    }
  }

  return null;
}

// Build station elements
function buildStations() {
  const panel = document.getElementById('panel');
  panelWidth = panel.offsetWidth;

  // Clear old stations, signals, sections
  panel.querySelectorAll('.station, .signal, .track-section, .train').forEach(el => el.remove());

  // Track sections between stations
  for (let i = 0; i < STATIONS.length - 1; i++) {
    const section = document.createElement('div');
    section.className = 'track-section';
    section.id = `section-${STATIONS[i].crs}-${STATIONS[i + 1].crs}`;
    const x1 = mileToX(STATIONS[i].mile);
    const x2 = mileToX(STATIONS[i + 1].mile);
    section.style.left = x1 + 'px';
    section.style.width = (x2 - x1) + 'px';
    panel.appendChild(section);
  }

  // Stations and signals
  STATIONS.forEach((stn, i) => {
    const x = mileToX(stn.mile);

    // Signal
    const signal = document.createElement('div');
    signal.className = 'signal';
    signal.id = `signal-${stn.crs}`;
    signal.style.left = (x + 12) + 'px';
    signal.innerHTML = `
      <div class="signal-lamp" id="lamp-red-${stn.crs}"></div>
      <div class="signal-lamp" id="lamp-yellow-${stn.crs}"></div>
      <div class="signal-lamp green" id="lamp-green-${stn.crs}"></div>
    `;
    panel.appendChild(signal);

    // Station marker
    const station = document.createElement('div');
    station.className = 'station';
    station.style.left = x + 'px';
    station.dataset.crs = stn.crs;
    station.innerHTML = `
      <div class="station-diamond"></div>
      <div class="station-label">${stn.name}</div>
      <div class="station-crs">${stn.crs}</div>
      <div class="station-mile">${stn.mile}mi</div>
    `;
    station.addEventListener('mouseenter', (e) => showStationTooltip(e, stn));
    station.addEventListener('mouseleave', hideTooltip);
    panel.appendChild(station);
  });
}

// Update signals based on train positions
function updateSignals(trainPositions) {
  // Reset all to green
  STATIONS.forEach(stn => {
    document.getElementById(`lamp-red-${stn.crs}`).className = 'signal-lamp';
    document.getElementById(`lamp-yellow-${stn.crs}`).className = 'signal-lamp';
    document.getElementById(`lamp-green-${stn.crs}`).className = 'signal-lamp green';
  });

  // Reset track sections
  document.querySelectorAll('.track-section').forEach(s => s.classList.remove('occupied'));

  trainPositions.forEach(tp => {
    if (tp.fromCrs === tp.toCrs) {
      // Train is at a station
      const lamp = document.getElementById(`lamp-red-${tp.fromCrs}`);
      if (lamp) lamp.className = 'signal-lamp red';
      const greenLamp = document.getElementById(`lamp-green-${tp.fromCrs}`);
      if (greenLamp) greenLamp.className = 'signal-lamp';
    } else {
      // Train between stations - red at departure station, yellow at station before
      const redLamp = document.getElementById(`lamp-red-${tp.fromCrs}`);
      if (redLamp) redLamp.className = 'signal-lamp red';
      const greenLampFrom = document.getElementById(`lamp-green-${tp.fromCrs}`);
      if (greenLampFrom) greenLampFrom.className = 'signal-lamp';

      // Yellow at station before fromCrs
      const fromIdx = STATIONS.findIndex(s => s.crs === tp.fromCrs);
      // For northbound trains (going right), the previous signal is to the left
      // For southbound (going left), previous signal is to the right
      const prevIdx = tp.direction === 'northbound' ? fromIdx - 1 : fromIdx + 1;
      if (prevIdx >= 0 && prevIdx < STATIONS.length) {
        const yellowLamp = document.getElementById(`lamp-yellow-${STATIONS[prevIdx].crs}`);
        if (yellowLamp) yellowLamp.className = 'signal-lamp yellow';
        const greenLampPrev = document.getElementById(`lamp-green-${STATIONS[prevIdx].crs}`);
        if (greenLampPrev) greenLampPrev.className = 'signal-lamp';
      }

      // Mark track section as occupied
      const sectionId = `section-${tp.fromCrs}-${tp.toCrs}`;
      const section = document.getElementById(sectionId);
      if (section) section.classList.add('occupied');
      // Also try reverse order for southbound
      const sectionIdRev = `section-${tp.toCrs}-${tp.fromCrs}`;
      const sectionRev = document.getElementById(sectionIdRev);
      if (sectionRev) sectionRev.classList.add('occupied');
    }
  });
}

// Render trains on the panel
function renderTrains(data) {
  const panel = document.getElementById('panel');
  panel.querySelectorAll('.train').forEach(el => el.remove());

  const trainPositions = [];
  let trainCount = 0;

  function processServices(services, direction) {
    if (!services || !services.departures) return;
    services.departures.forEach(svc => {
      if (svc.cancelled) return;
      const pos = getTrainPosition(svc.calling_points, direction);
      if (!pos) return;

      trainCount++;
      const x = mileToX(pos.mile);
      const arrow = direction === 'northbound' ? '▶' : '◀';
      const train = document.createElement('div');
      train.className = `train ${direction}`;
      train.style.left = x + 'px';
      train.innerHTML = `<span class="train-arrow">${arrow}</span> ${svc.scheduled}`;
      train.title = `${svc.scheduled} to ${svc.destination}${svc.platform ? ' · Plat ' + svc.platform : ''}`;
      panel.appendChild(train);

      trainPositions.push({
        ...pos,
        direction,
        scheduled: svc.scheduled,
        destination: svc.destination,
      });
    });
  }

  processServices(data.northbound, 'northbound');
  processServices(data.southbound, 'southbound');

  updateSignals(trainPositions);
  document.getElementById('train-count').textContent = `Trains: ${trainCount}`;
  document.getElementById('last-update').textContent = `Updated: ${new Date().toLocaleTimeString('en-GB')}`;
}

// Station tooltip
function showStationTooltip(event, station) {
  if (!allData) return;
  const tooltip = document.getElementById('tooltip');
  let html = `<h3>${station.name} (${station.crs})</h3>`;

  // Find next trains at this station
  function getNextTrains(services, direction) {
    if (!services || !services.departures) return [];
    const trains = [];
    const now = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes();

    services.departures.forEach(svc => {
      const cp = svc.calling_points.find(cp => cp.crs === station.crs);
      if (!cp) return;
      const t = timeToMins(cp.scheduled);
      if (t !== null && t >= nowMins - 5) {
        trains.push({
          time: cp.scheduled,
          expected: cp.expected || svc.expected,
          platform: cp.platform || svc.platform,
          destination: svc.destination,
          direction,
        });
      }
    });
    return trains.slice(0, 3);
  }

  const nbTrains = getNextTrains(allData.northbound, '→ GLC');
  const sbTrains = getNextTrains(allData.southbound, '→ AYR');

  if (nbTrains.length) {
    html += `<div class="tt-dir">Northbound → Glasgow</div>`;
    nbTrains.forEach(t => {
      html += `<div class="tt-row"><span>${t.time}</span><span>${t.expected}</span>${t.platform ? `<span>Plat ${t.platform}</span>` : ''}</div>`;
    });
  }

  if (sbTrains.length) {
    html += `<div class="tt-dir">Southbound → Ayr</div>`;
    sbTrains.forEach(t => {
      html += `<div class="tt-row"><span>${t.time}</span><span>${t.expected}</span>${t.platform ? `<span>Plat ${t.platform}</span>` : ''}</div>`;
    });
  }

  if (!nbTrains.length && !sbTrains.length) {
    html += '<div style="color:var(--text-dim)">No upcoming services</div>';
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');

  const rect = event.target.closest('.station').getBoundingClientRect();
  const panelRect = document.getElementById('panel').getBoundingClientRect();
  tooltip.style.left = (rect.left - panelRect.left) + 'px';
  tooltip.style.top = (rect.bottom - panelRect.top + 8) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// Fetch data
async function fetchData() {
  try {
    const resp = await fetch('/api/all');
    const data = await resp.json();
    allData = data;
    renderTrains(data);
  } catch (err) {
    console.error('Fetch error:', err);
  }
}

// Init
function init() {
  buildStations();
  fetchData();
  setInterval(fetchData, 30000);
  window.addEventListener('resize', () => {
    buildStations();
    if (allData) renderTrains(allData);
  });
}

init();
</script>
